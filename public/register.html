<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Регистрация</h1>
        
        <form action="/register" method="POST">
            <input type="text" name="login" placeholder="Логин (латиница и цифры, min 6)" required>
            <input type="password" name="password" placeholder="Пароль (min 8 символов)" required>
            <input type="text" name="fullname" placeholder="ФИО (только русские буквы)" required>
            <input type="text" name="phone" placeholder="Телефон: 8(XXX)XXX-XX-XX" required>
            <input type="email" name="email" placeholder="Email" required>
            
            <button type="submit">Зарегистрироваться</button>
        </form>
        
        <form action="/" method="GET">
            <button type="submit" style="background: #6c757d;">Назад</button>
        </form>
        
        <div id="error" class="error"></div>
    </div>

    <script>
        // Показываем ошибку из URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('error');
            errorDiv.innerText = decodeURIComponent(error);
            errorDiv.style.display = 'block';
            
            // Скрываем ошибку через 5 секунд
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
